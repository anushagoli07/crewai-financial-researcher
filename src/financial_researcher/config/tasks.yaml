research_task:
  description: >
    You MUST use the search tool AT LEAST 5 times with different queries before
    writing your final answer. Do NOT write a final answer until you have completed
    ALL 5 searches below:

    Search 1: "Tesla stock price and financial performance 2025 2026"
    Search 2: "Tesla revenue earnings Q4 2024 annual results"
    Search 3: "Tesla news April 2026"
    

    Only after completing all 5 searches, compile a structured research summary
    with sections for: Financial Health, Recent News, Challenges, and Outlook.
    Include specific numbers and dates from your searches.

  expected_output: >
    A detailed research summary with 5 clearly labeled sections, each grounded
    in data from a separate search. Must include specific figures and dates.
  agent: researcher

analysis_task:
  description: >
    Analyze the research findings and create a comprehensive report on {company}.
    Your report should:
    1. Begin with an executive summary
    2. Include all key information from the research
    3. Provide insightful analysis of trends and patterns
    4. Offer a market outlook for company, noting that this should not be used for trading decisions
    5. Be formatted in a professional, easy-to-read style with clear headings
  expected_output: >
    A polished, professional report on {company} that presents the research
    findings with added analysis and insights. The report should be well-structured
    with an executive summary, main sections, and conclusion.
  agent: analyst
  context:
    - research_task
  output_file: output/report.md
